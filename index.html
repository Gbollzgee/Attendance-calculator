<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status Check</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --glass-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1a 100%);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
            overflow: hidden;
        }

        /* Glassmorphism Card */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            max-width: 400px;
            width: 90%;
            position: relative;
        }

        /* Animated Pulsing Icon */
        .loader-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            border: 3px solid transparent;
            border-top-color: var(--neon-blue);
            border-bottom-color: var(--neon-purple);
            border-radius: 50%;
            animation: spin 2s linear infinite, glow 1.5s ease-in-out infinite alternate;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes glow {
            from { box-shadow: 0 0 5px var(--neon-blue); }
            to { box-shadow: 0 0 20px var(--neon-purple); }
        }

        h1 {
            font-size: 1.8rem;
            letter-spacing: 2px;
            margin-bottom: 10px;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        p {
            color: rgba(255, 255, 255, 0.7);
            font-weight: 300;
            line-height: 1.6;
        }

        .badge {
            display: inline-block;
            margin-top: 20px;
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            font-size: 0.8rem;
            color: var(--neon-blue);
            border: 1px solid rgba(0, 210, 255, 0.3);
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="loader-icon"></div>
        <h1>Results Not Yet Out</h1>
        <p>The semester is still in progress. Final calculations will be available once the attendance window closes on June 29th.</p>
        <div class="badge">Status: Pending Verification</div>
    </div>

</body>
</html>
